name: miniterminal
description: A lightweight SSH terminal client for iOS/Android (a free Termius alternative).
publish_to: "none"
version: 0.9.1+10

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dartssh2: ^2.9.0
  xterm: ^4.0.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  uuid: ^4.4.0
  provider: ^6.1.2
  file_selector: ^1.0.3
  path_provider: ^2.1.3
  local_auth: ^2.2.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: "assets/icon/icon.png"
