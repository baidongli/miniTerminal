name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_ORG: com.baidongli
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

jobs:
  android:
    name: Build Android (APK + Play AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform scaffolding (real bundle id)
        run: >
          flutter create --org ${{ env.APP_ORG }}
          --project-name miniterminal --platforms=android,ios .

      - name: Enable biometric + required permissions
        run: |
          find android/app/src/main -name 'MainActivity.kt' -print -exec sed -i \
            -e 's/io\.flutter\.embedding\.android\.FlutterActivity/io.flutter.embedding.android.FlutterFragmentActivity/' \
            -e 's/: *FlutterActivity()/: FlutterFragmentActivity()/' {} +
          MAN=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MAN" || sed -i \
            's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$MAN"
          grep -q 'USE_BIOMETRIC' "$MAN" || sed -i \
            's#<application#<uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <application#' "$MAN"
          sed -i 's/android:label="miniterminal"/android:label="MiniTerminal"/' "$MAN"
          GR=android/app/build.gradle.kts
          if [ -f "$GR" ]; then
            sed -i '/^[[:space:]]*ndkVersion[[:space:]]*=/d' "$GR"
            echo "Stripped forced ndkVersion (no native code)."
          fi
          python3 tool/patch_android_compilesdk.py

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Configure Play upload signing (only if secrets present)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          python3 tool/patch_android_signing.py

      - name: Build release APK (split per ABI, for sideloading)
        run: >
          flutter build apk --release --split-per-abi
          --build-number=${{ github.run_number }}

      - name: Build signed AAB for Google Play (only if secrets present)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: >
          flutter build appbundle --release
          --build-number=${{ github.run_number }}

      - name: Upload AAB to Google Play internal track (if configured)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.baidongli.miniterminal
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             dist/miniterminal.apk
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            cp build/app/outputs/bundle/release/app-release.aab \
               dist/miniterminal.aab
            echo "AAB built (Play-ready)."
          else
            echo "No AAB (keystore secrets not set) — APK only."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miniterminal-build
          path: dist/*
          if-no-files-found: error

      - name: Publish APK to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: MiniTerminal — latest Android build
          body: |
            Auto-built **release** APK (arm64-v8a) from `main`.
            Commit: ${{ github.sha }}

            Sideload `miniterminal.apk` on Android (allow "install
            unknown apps"). For Google Play, the signed
            `miniterminal.aab` is in the workflow artifacts (requires
            keystore secrets — see STORE_RELEASE.md).
          files: dist/miniterminal.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios-archive:
    name: iOS (App Store archive if signed, else compile check)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform scaffolding (real bundle id)
        run: >
          flutter create --org ${{ env.APP_ORG }}
          --project-name miniterminal --platforms=android,ios .

      - name: Set iOS display name + App Store review keys
        run: |
          PLIST=ios/Runner/Info.plist
          pb() { /usr/libexec/PlistBuddy -c "$1" "$PLIST" 2>/dev/null; }
          pb "Set :CFBundleDisplayName MiniTerminal" \
            || pb "Add :CFBundleDisplayName string MiniTerminal"
          pb "Set :ITSAppUsesNonExemptEncryption false" \
            || pb "Add :ITSAppUsesNonExemptEncryption bool false"
          pb "Set :NSFaceIDUsageDescription Unlock MiniTerminal with Face ID." \
            || pb "Add :NSFaceIDUsageDescription string Unlock MiniTerminal with Face ID."
          pb "Set :NSLocalNetworkUsageDescription MiniTerminal uses the local network to reach SSH servers on your network." \
            || pb "Add :NSLocalNetworkUsageDescription string MiniTerminal uses the local network to reach SSH servers on your network."

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build iOS (no codesign — App Store signing pending account)
        run: >
          flutter build ios --release --no-codesign
          --build-number=${{ github.run_number }}

  macos:
    name: Build macOS app
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate macOS scaffolding (real bundle id)
        run: >
          flutter create --org ${{ env.APP_ORG }}
          --project-name miniterminal --platforms=macos .

      - name: Configure macOS (sandbox network entitlements + app name)
        run: |
          for ENT in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$ENT" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :com.apple.security.network.client true" "$ENT"
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$ENT" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :com.apple.security.network.server true" "$ENT"
          done
          sed -i '' 's/PRODUCT_NAME = miniterminal/PRODUCT_NAME = MiniTerminal/' \
            macos/Runner/Configs/AppInfo.xcconfig

      - name: Disable Swift Package Manager (CocoaPods only)
        run: flutter config --no-enable-swift-package-manager

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (release, ad-hoc signed)
        run: flutter build macos --release --build-number=${{ github.run_number }}

      - name: Package .app
        run: |
          mkdir -p dist
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --keepParent "$APP" dist/MiniTerminal-macos.zip

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniterminal-macos
          path: dist/MiniTerminal-macos.zip
          if-no-files-found: error
