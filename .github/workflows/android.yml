name: Build APK

on:
  push:
    branches:
      - claude/ssh-terminal-app-TGYBf
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android/iOS platform scaffolding
        run: flutter create --platforms=android,ios --project-name miniterminal .

      - name: Enable biometric (FlutterFragmentActivity for local_auth)
        run: |
          find android/app/src/main -name 'MainActivity.kt' -print -exec sed -i \
            -e 's/io\.flutter\.embedding\.android\.FlutterActivity/io.flutter.embedding.android.FlutterFragmentActivity/' \
            -e 's/: *FlutterActivity()/: FlutterFragmentActivity()/' {} +
          MAN=android/app/src/main/AndroidManifest.xml
          grep -q 'USE_BIOMETRIC' "$MAN" || sed -i \
            's#<application#<uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <application#' "$MAN"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build release APK (split per ABI, debug-signed)
        run: flutter build apk --release --split-per-abi

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             dist/miniterminal.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniterminal-apk
          path: dist/miniterminal.apk
          if-no-files-found: error

      - name: Publish APK to a rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: MiniTerminal — latest Android build
          body: |
            Auto-built **release** APK (arm64-v8a) from branch
            `claude/ssh-terminal-app-TGYBf`. Commit: ${{ github.sha }}

            Smaller & faster than debug. Works on virtually all modern
            phones (arm64). On your Android phone: download
            `miniterminal.apk` below, then allow "install unknown apps"
            for your browser when prompted. If you previously installed a
            debug build, uninstall it first (different signature).
          files: dist/miniterminal.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios-compile-check:
    name: iOS compile check (no signing)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform scaffolding
        run: flutter create --platforms=android,ios --project-name miniterminal .

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug
